version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: gridguard-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - gridguard-network

  grafana:
    image: grafana/grafana:latest
    container_name: gridguard-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - gridguard-network

networks:
  gridguard-network:
    external: true
