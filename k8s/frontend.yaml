apiVersion: apps/v1
kind: Deployment
metadata:
  name: gridguard-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gridguard-frontend
  template:
    metadata:
      labels:
        app: gridguard-frontend
    spec:
      containers:
      - name: frontend
        image: gridguard-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer
  selector:
    app: gridguard-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
